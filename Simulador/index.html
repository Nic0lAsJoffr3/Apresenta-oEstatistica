<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação Estatistica</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
             width: 100vw;
             height: 100vh;
            background-color: transparent;
            
        }

        .InputDiv {
            position: absolute;
            margin: 10vh 35vw 15vh 35vw;
            width: 30vw;
            height: 60vh;
            background-color: #0000001e;
            box-shadow: #192a3b 0px 0px 15px;
            border-radius: 20px;
        }

        .InputDiv button,
        .InputDiv input {
            border: none;
            padding: 0;
            margin: 0 20% 0 20%;
            width: 60%;
            height: 5vh;
            border-radius: 15px;
            position: absolute;
        }

        h1,
        h2 {
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            padding: 0;
            position: absolute;
            text-align: center;
            width: 100%;
            overflow: hidden;
        }

        h1 {
            top: 0;
            font-size: clamp(15px, 1vw, 25px);
        }

        h2 {
            font-size: clamp(10px, 1vw, 20px);
            position: absolute;
        }

        .InputDiv input {
            text-align: center;
            font-size: 30px;
            background-color: #0e0e0e9c;
            color: white;
            border: #15202B 1px solid;
        }

        .InputDiv .inputB {
            margin: 20% 40% 0 40%;
            height: 20%;
            width: 20%;
        }

        .InputDiv .inputS {
            margin: 55% 20% 0 20%;
            height: 20%;
            width: 60%;
        }
        .h2B{
            top: 5vh;
        }
        .h2S{
            top: 25vh;
        }
        .InputDiv button {
            font-family: Arial, Helvetica, sans-serif;
            bottom: 50px;
            font-size: 30px;
            background-color: rgb(31, 146, 20);
            color: #ffffff;
            text-shadow: 0px 0px 1px black;
        }

        .InputDiv button:focus,
        .InputDiv input:focus {
            border: none;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="InputDiv">
        <h1>Simulador de Distribuição Uniforme Contínua</h1>
        <h2 class="h2B">Quantidade de barras</h2>
        <input value="15" id="inputNumberB" type="number" class="inputB">
        <h2 class="h2S">Quantidade de Numeros Sorteados</h2>
        <input value="1000000000" id="inputNumberS" type="number" class="inputS">
        <button onclick="Start()">Gerar Simulação</button>
    </div>
</body>
<script>
    if (window.innerWidth < 900 || window.innerWidth < window.innerHeight) {

        document.body.innerHTML = `
    
    <div style="
        color:#B2B2B2;
        font-family:Arial;
        display:block;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-size:20px;
        text-align:center;
        background:#121212;
    ">
        Não Disponivel para <b> Celular</b><br>
        Acesse 
        <i><a style="color:white; font-size:20px;" href="https://nic0lasjoffr3.github.io/SimulacaoEstatistica/">https://nic0lasjoffr3.github.io/SimulacaoEstatistica/</a></i>
        , em um <b>Computador</b>

    </div>
    
    `;
    }

    function Start() {
        var sizeBar = document.getElementById("inputNumberB").value;
        var maxSorteados = document.getElementById("inputNumberS").value;
        window.location.href = `desenhar.html?sizeBar=${sizeBar}&maxSorteados=${maxSorteados}`;
    }
</script>

</html>
